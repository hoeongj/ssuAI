spring:
  application:
    name: ssuai
  profiles:
    default: dev
  ai:
    mcp:
      server:
        name: ssuai-mcp
        version: 0.0.1
        type: SYNC
      client:
        enabled: ${SSUAI_MCP_CLIENT_ENABLED:true}
        name: ssuai-self-mcp-client
        version: 0.0.1
        type: SYNC
        request-timeout: 10s
        sse:
          connections:
            self:
              url: ${SSUAI_MCP_CLIENT_BASE_URL:http://localhost:8080}
              sse-endpoint: /sse

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

ssuai:
  connector:
    meal: mock # mock | real
    dorm-meal: mock # mock | real
    chat: ${SSUAI_CONNECTOR_CHAT:mock} # mock | llm
  chat:
    llm:
      max-tokens: ${SSUAI_LLM_MAX_TOKENS:400}
      temperature: 0.3
      availability-verification-passes: ${SSUAI_LLM_AVAILABILITY_VERIFICATION_PASSES:0}
      max-provider-attempts: ${SSUAI_LLM_MAX_PROVIDER_ATTEMPTS:6}
      max-models-per-provider: ${SSUAI_LLM_MAX_MODELS_PER_PROVIDER:2}
      max-tool-calls: ${SSUAI_LLM_MAX_TOOL_CALLS:2}
      provider-order:
        - gemini
        - groq
        - openrouter
        - cerebras
        - deepinfra
        - sambanova
        - nscale
        - fireworks
        - huggingface
        - mistral
      private-provider-order:
        - groq
        - cerebras
        - deepinfra
        - sambanova
        - nscale
        - fireworks
        - huggingface
        - mistral
        - openrouter
      gemini:
        base-url: ${SSUAI_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
        api-key: ${SSUAI_GEMINI_API_KEY:}
        public-models:
          - gemini-2.5-flash-lite
          - gemini-2.5-flash
      groq:
        base-url: ${SSUAI_GROQ_BASE_URL:https://api.groq.com/openai/v1}
        api-key: ${SSUAI_GROQ_API_KEY:}
        public-models:
          - llama-3.3-70b-versatile
          - openai/gpt-oss-120b
        private-models:
          - llama-3.3-70b-versatile
          - openai/gpt-oss-120b
      cerebras:
        base-url: ${SSUAI_CEREBRAS_BASE_URL:https://api.cerebras.ai/v1}
        api-key: ${SSUAI_CEREBRAS_API_KEY:}
        public-models:
          - gpt-oss-120b
          - llama3.1-8b
        private-models:
          - gpt-oss-120b
          - llama3.1-8b
      deepinfra:
        base-url: ${SSUAI_DEEPINFRA_BASE_URL:https://api.deepinfra.com/v1/openai}
        api-key: ${SSUAI_DEEPINFRA_API_KEY:}
        public-models:
          - meta-llama/Llama-3.3-70B-Instruct
          - openai/gpt-oss-120b
        private-models:
          - meta-llama/Llama-3.3-70B-Instruct
          - openai/gpt-oss-120b
      sambanova:
        base-url: ${SSUAI_SAMBANOVA_BASE_URL:https://api.sambanova.ai/v1}
        api-key: ${SSUAI_SAMBANOVA_API_KEY:}
        public-models:
          - Meta-Llama-3.3-70B-Instruct
          - gpt-oss-120b
        private-models:
          - Meta-Llama-3.3-70B-Instruct
          - gpt-oss-120b
      nscale:
        base-url: ${SSUAI_NSCALE_BASE_URL:https://inference.api.nscale.com/v1}
        api-key: ${SSUAI_NSCALE_API_KEY:}
        public-models:
          - openai/gpt-oss-120b
          - meta-llama/Llama-3.1-8B-Instruct
        private-models:
          - openai/gpt-oss-120b
          - meta-llama/Llama-3.1-8B-Instruct
      fireworks:
        base-url: ${SSUAI_FIREWORKS_BASE_URL:https://api.fireworks.ai/inference/v1}
        api-key: ${SSUAI_FIREWORKS_API_KEY:}
        public-models:
          - accounts/fireworks/models/gpt-oss-120b
          - accounts/fireworks/models/llama-v3p3-70b-instruct
        private-models:
          - accounts/fireworks/models/gpt-oss-120b
          - accounts/fireworks/models/llama-v3p3-70b-instruct
      huggingface:
        base-url: ${SSUAI_HUGGINGFACE_BASE_URL:https://router.huggingface.co/v1}
        api-key: ${SSUAI_HUGGINGFACE_API_KEY:}
        public-models:
          - openai/gpt-oss-120b:fastest
          - meta-llama/Llama-3.3-70B-Instruct:fastest
        private-models:
          - openai/gpt-oss-120b:fastest
          - meta-llama/Llama-3.3-70B-Instruct:fastest
      mistral:
        base-url: ${SSUAI_MISTRAL_BASE_URL:https://api.mistral.ai/v1}
        api-key: ${SSUAI_MISTRAL_API_KEY:}
        training-opt-out-confirmed: ${SSUAI_MISTRAL_TRAINING_OPT_OUT_CONFIRMED:false}
        public-models:
          - mistral-small-latest
          - devstral-small-latest
        private-models:
          - mistral-small-latest
          - devstral-small-latest
      openrouter:
        base-url: ${SSUAI_OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        api-key: ${SSUAI_OPENROUTER_API_KEY:}
        http-referer: ${SSUAI_OPENROUTER_HTTP_REFERER:}
        app-title: ${SSUAI_OPENROUTER_APP_TITLE:ssuAI}
        public-require-zdr: false
        private-require-zdr: true
        public-data-collection: allow
        private-data-collection: deny
        max-price-prompt: 0
        max-price-completion: 0
        public-models:
          - inclusionai/ring-2.6-1t:free
          - nvidia/nemotron-3-super-120b-a12b:free
          - openai/gpt-oss-120b:free
          - qwen/qwen3-coder:free
          - qwen/qwen3-next-80b-a3b-instruct:free
          - arcee-ai/trinity-large-thinking:free
          - google/gemma-4-31b-it:free
          - google/gemma-4-26b-a4b-it:free
          - minimax/minimax-m2.5:free
          - z-ai/glm-4.5-air:free
          - meta-llama/llama-3.3-70b-instruct:free
          - openai/gpt-oss-20b:free
          - nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
          - nvidia/nemotron-3-nano-30b-a3b:free
          - nvidia/nemotron-nano-12b-v2-vl:free
          - nvidia/nemotron-nano-9b-v2:free
          - poolside/laguna-m.1:free
          - poolside/laguna-xs.2:free
          - baidu/cobuddy:free
          - openrouter/free
          - openrouter/owl-alpha
        private-models:
          - inclusionai/ring-2.6-1t:free
          - arcee-ai/trinity-large-thinking:free
          - z-ai/glm-4.5-air:free
          - qwen/qwen3-coder:free
          - meta-llama/llama-3.3-70b-instruct:free
          - qwen/qwen3-next-80b-a3b-instruct:free
