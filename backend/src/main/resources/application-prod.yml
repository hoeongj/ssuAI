# This file is committed to the repository (see backend/.gitignore exception).
# Per docs/security.md §3, it MUST NOT contain secrets — only non-sensitive
# baseline settings or `${ENV_VAR}` references. DB passwords, JWT keys,
# session cookies, API tokens etc. belong in environment variables and are
# read via ${ENV_VAR:default} in this file or supplied at deploy time.
ssuai:
  connector:
    meal: real
    dorm-meal: real
  # Production CORS allowlist — exactly one origin (the deployed Vercel
  # project), wired into WebCorsProdConfig. The value is supplied at
  # deploy time via the SSUAI_FRONTEND_ORIGIN env var (set on the
  # ssuai-backend-config ConfigMap). Empty default makes the binding
  # explicit; WebCorsProdConfig fails fast with a clear message if it
  # ever resolves to blank, per docs/security.md §8.
  frontend:
    origin: ${SSUAI_FRONTEND_ORIGIN:}

# JVM tuning: prefer setting JAVA_OPTS on the ConfigMap (e.g.
# `-XX:+UseG1GC -XX:MaxRAMPercentage=75.0`) so it can be tweaked
# without a rebuild. The Dockerfile applies JAVA_OPTS via ENTRYPOINT.

springdoc:
  swagger-ui:
    enabled: false
