version: 2

updates:
  - package-ecosystem: gradle
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      backend-minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, backend]
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      frontend-minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, frontend]
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, ci]
    commit-message:
      prefix: chore(deps)
      include: scope

# Major-version bumps continue to file individual PRs (one per dep)
# so they get individual scrutiny -- that's Dependabot's behaviour
# whenever a `groups` block doesn't include `[major]`.
#
# Security advisories file out-of-band PRs immediately, regardless of
# the weekly schedule. That's the default and is preserved.
