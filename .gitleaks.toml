[extend]
# inherit gitleaks default rule pack
useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-api03-[A-Za-z0-9_-]{20,}'''
keywords = [
    "sk-ant-api03",
]

[[allowlists]]
description = "ssuAI: documentation that legitimately mentions secret types"
paths = [
    '''docs/security\.md''',
    '''docs/architecture\.md''',
]

[[allowlists]]
description = "ssuAI: deploy templates with placeholder values"
paths = [
    '''deploy/charts/ssuai-backend/templates/secret\.example\.yaml''',
    '''deploy/argocd/image-updater/secret\.example\.yaml''',
]
