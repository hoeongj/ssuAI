# Template only — do NOT commit a real Secret with values.
#
# Usage:
#   1. Copy this file to a path outside the repo (e.g. ~/.ssuai/secret.yaml).
#   2. Replace placeholder values.
#   3. kubectl apply -f ~/.ssuai/secret.yaml
#
# LLM chatbot mode can use Gemini, Groq, Cerebras, DeepInfra, SambaNova,
# Nscale, Fireworks, Hugging Face, Mistral, and OpenRouter API keys. Keep real
# values outside the repository and apply a copied Secret manifest during deployment.
#
# When adding a key here:
#   - Confirm it is genuinely secret (env-specific config goes in
#     ConfigMap, not Secret).
#   - Reference it from deployment.yaml via envFrom.secretRef or
#     env[].valueFrom.secretKeyRef.
#   - Document the rotation policy in docs/security.md.

apiVersion: v1
kind: Secret
metadata:
  name: ssuai-backend-secrets
  namespace: ssuai-prod
  labels:
    app.kubernetes.io/name: ssuai-backend
    app.kubernetes.io/part-of: ssuai
type: Opaque
stringData:
  SSUAI_GEMINI_API_KEY: "<replace-me>"
  SSUAI_GROQ_API_KEY: "<replace-me>"
  SSUAI_CEREBRAS_API_KEY: "<replace-me>"
  SSUAI_DEEPINFRA_API_KEY: "<replace-me>"
  SSUAI_SAMBANOVA_API_KEY: "<replace-me>"
  SSUAI_NSCALE_API_KEY: "<replace-me>"
  SSUAI_FIREWORKS_API_KEY: "<replace-me>"
  SSUAI_HUGGINGFACE_API_KEY: "<replace-me>"
  SSUAI_MISTRAL_API_KEY: "<replace-me>"
  SSUAI_OPENROUTER_API_KEY: "<replace-me>"
