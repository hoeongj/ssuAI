# Template only — do NOT commit a real Secret with values.
#
# Usage:
#   1. Copy this file to a path outside the repo (e.g. ~/.ssuai/secret.yaml).
#   2. Replace placeholder values.
#   3. kubectl apply -f ~/.ssuai/secret.yaml
#
# The MVP backend has no secrets yet (no DB, no auth, no third-party
# tokens). This file is reserved for the first task that needs one
# (auth task → JWT signing key, persistence task → DB password, etc.)
# so that the manifest layout doesn't change when secrets enter the
# picture.
#
# When adding a key here:
#   - Confirm it is genuinely secret (env-specific config goes in
#     ConfigMap, not Secret).
#   - Reference it from deployment.yaml via envFrom.secretRef or
#     env[].valueFrom.secretKeyRef.
#   - Document the rotation policy in docs/security.md.

apiVersion: v1
kind: Secret
metadata:
  name: ssuai-backend-secrets
  namespace: ssuai-prod
  labels:
    app.kubernetes.io/name: ssuai-backend
    app.kubernetes.io/part-of: ssuai
type: Opaque
stringData:
  # Example shape — uncomment and replace when a real secret is added:
  # SSUAI_DB_PASSWORD: "<replace-me>"
  # SSUAI_JWT_SIGNING_KEY: "<replace-me>"
  PLACEHOLDER: "no-secrets-yet"
