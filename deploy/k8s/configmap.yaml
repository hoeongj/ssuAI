apiVersion: v1
kind: ConfigMap
metadata:
  name: ssuai-backend-config
  namespace: ssuai-prod
  labels:
    app.kubernetes.io/name: ssuai-backend
    app.kubernetes.io/part-of: ssuai
data:
  # Activates application-prod.yml on top of application.yml.
  SPRING_PROFILES_ACTIVE: "prod"

  # Production CORS allowlist. Replace with the real Vercel project
  # origin (no trailing slash). Read by WebCorsConfig under @Profile("prod").
  SSUAI_FRONTEND_ORIGIN: "https://ssuai.vercel.app"

  # JVM tuning. MaxRAMPercentage cooperates with the pod memory limit;
  # G1GC is the JDK 21 default. Override here without rebuilding the image.
  JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"

  # Connector flags — production should hit real Soongsil sites. These
  # are also the defaults in application-prod.yml; the ConfigMap just
  # makes them visible to operators inspecting the live pod env.
  SSUAI_CONNECTOR_MEAL: "real"
  SSUAI_CONNECTOR_DORM_MEAL: "real"
  # Keep public chat on deterministic mock mode unless provider API keys and
  # quota are intentionally configured. Set to "llm" to enable hosted LLM mode.
  SSUAI_CONNECTOR_CHAT: "mock"

  # Set to "true" only after the Mistral workspace has explicitly opted out
  # of API input/output training in the Mistral Admin Console.
  SSUAI_MISTRAL_TRAINING_OPT_OUT_CONFIRMED: "false"

  # LLM fallback cost guardrails. Keep these small unless the live quota and
  # latency budget have been checked.
  SSUAI_LLM_AVAILABILITY_VERIFICATION_PASSES: "0"
  SSUAI_LLM_MAX_PROVIDER_ATTEMPTS: "6"
  SSUAI_LLM_MAX_MODELS_PER_PROVIDER: "2"
